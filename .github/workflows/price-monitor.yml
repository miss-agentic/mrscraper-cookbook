name: "Price Monitor"

# This workflow lives at the cookbook repo ROOT (.github/workflows/), because
# GitHub Actions only runs workflows from the repository root — never from a
# subfolder. The recipe itself lives in price-monitoring/, so run steps set
# working-directory there, and the root-relative paths (cache, artifact) are
# prefixed with price-monitoring/.

on:
  schedule:
    - cron: "0 */6 * * *"        # every 6 hours (UTC)
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (scrape but don't store)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      threshold:
        description: "Alert threshold percentage"
        required: false
        default: "5.0"
        type: string

env:
  PYTHON_VERSION: "3.12"
  DB_DIR: "data"

defaults:
  run:
    working-directory: price-monitoring

jobs:
  scrape-and-monitor:
    name: "Scrape prices & detect changes"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Persist the SQLite price history between runs so each run can diff
      # against the previous one. Path is relative to the repo root.
      - name: Restore price database from cache
        uses: actions/cache@v4
        with:
          path: price-monitoring/data/prices.db
          key: price-db-${{ github.run_number }}
          restore-keys: |
            price-db-

      - name: Run price monitor pipeline
        env:
          MRSCRAPER_API_TOKEN: ${{ secrets.MRSCRAPER_API_TOKEN }}
          ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
          ALERT_WEBHOOK_FORMAT: ${{ secrets.ALERT_WEBHOOK_FORMAT }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          THRESHOLD="${{ github.event.inputs.threshold || '5.0' }}"
          python -m src.pipeline $DRY_RUN_FLAG --threshold $THRESHOLD

      - name: Upload price database
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: price-database-${{ github.run_number }}
          path: price-monitoring/data/prices.db
          retention-days: 90
