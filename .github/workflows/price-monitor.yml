name: "Price Monitor"

# Lives at the repo ROOT because GitHub Actions only runs workflows from
# .github/workflows/ at the root, never from a subfolder. The recipe is in
# price-monitoring/, so steps set working-directory there and root-relative
# paths (the cache) are prefixed with price-monitoring/.

on:
  schedule:
    - cron: "0 */6 * * *"          # every 6 hours (UTC)
  workflow_dispatch:               # manual "Run workflow" button

defaults:
  run:
    working-directory: price-monitoring

jobs:
  monitor:
    name: "Scrape & detect changes"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Carry the previous run's snapshot forward so this run has something to
      # diff against. Rolling key: each run writes a new cache, restore-keys
      # pulls the most recent one back.
      - name: Restore previous snapshot
        uses: actions/cache@v4
        with:
          path: price-monitoring/data/snapshot.json
          key: price-snapshot-${{ github.run_number }}
          restore-keys: |
            price-snapshot-

      - name: Run monitor
        env:
          MRSCRAPER_API_TOKEN: ${{ secrets.MRSCRAPER_API_TOKEN }}
        run: python monitor.py

      - name: Upload snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-${{ github.run_number }}
          path: price-monitoring/data/snapshot.json
          retention-days: 90
